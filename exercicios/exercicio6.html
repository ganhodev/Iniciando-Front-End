<!-- Listando Itens em HTML -->
<!DOCTYPE html>
<html>
    <head>
        <title>Exercício 6</title>
    </head>
    <body>
        <h1>Meu projeto pessoal</h1>
        <h2>Uma breve introdução</h2>
        <p>Este é um projeto que visa...</p>
        <img src="imagem.jpg" alt="Descrição da imagem">
        <!-- Para criar uma lista não ordenada a tag de abertura
        <ul> indica o início da lista, 
        enquanto a tag de fechamento </ul> sinaliza o final dela.
        Cada item é inserido entre as tags <li> -->
        <ul>
            <li>Característica 1</li>
            <li>Característica 2</li>
            <li>Característica 3</li>
        </ul>
    </body>
</html>
